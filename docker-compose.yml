services:
  db:
    image: postgres:17-alpine
    container_name: curio-db
    restart: unless-stopped
    environment:
      TZ: Asia/Shanghai
      POSTGRES_DB: curio
      POSTGRES_USER: curio
      POSTGRES_PASSWORD: curio
    volumes:
      - ./data/postgres:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U curio -d curio"]
      interval: 5s
      timeout: 5s
      retries: 20

  redis:
    image: redis:7-alpine
    container_name: curio-redis
    command:
      - redis-server
      - --appendonly
      - "yes"
      - --maxmemory
      - "192mb"
      - --maxmemory-policy
      - allkeys-lru
    restart: unless-stopped
    volumes:
      - ./data/redis:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 20

  curio:
    image: mon3trd/curio:1.0.2
    container_name: curio
    user: "0:0"
    restart: unless-stopped
    environment:
      TZ: Asia/Shanghai
      CURIO_PLAY_SECRET: "change-me"
    ports:
      - "8080:8080"
      - "18097:8097"
    volumes:
      - ./data/Curio:/data/Curio
      - ./config:/config
    extra_hosts:
      - "host.docker.internal:host-gateway"
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
